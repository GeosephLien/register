<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AC2 Register Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <nav class="page-nav" aria-label="Page navigation">
    <a class="nav-link nav-link-secondary" href="https://geosephlien.github.io/landing/">Back</a>
  </nav>

  <main class="register-shell">
    <section class="panel form-panel">
      <div class="panel-header">
        <h2>Get Your Sample Project</h2>
        <p>Provide your email and domain to download.</p>
      </div>

        <form id="generator-form" class="generator-form">
          <fieldset>
            <label>
              <span>Email</span>
              <input name="tenantId" type="text" placeholder="openme@htc.com">
              <span class="field-error" data-field-error="tenantId"></span>
            </label>
            <label>
              <span>Host Origin</span>
              <input name="hostOrigin" type="url" placeholder="http://localhost:5500">
              <span class="field-error" data-field-error="hostOrigin"></span>
            </label>
          </fieldset>

        <div class="form-actions">
          <button id="download-demo-button" class="copy-button" type="button">Download</button>
        </div>
      </form>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
