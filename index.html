<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AC2 Register Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page">
    <main class="hero-shell">
      <section class="hero" aria-label="Register hero">
        <div class="hero-backdrop hero-backdrop-left" aria-hidden="true"></div>
        <div class="hero-backdrop hero-backdrop-right" aria-hidden="true"></div>
        <div class="hero-orb hero-orb-a" aria-hidden="true"></div>
        <div class="hero-orb hero-orb-b" aria-hidden="true"></div>
        <div class="hero-orb hero-orb-c" aria-hidden="true"></div>
        <div class="hero-orb hero-orb-d" aria-hidden="true"></div>

        <div class="hero-grid">
          <section class="hero-copy">
            <a class="hero-secondary-cta hero-back-link" href="https://geosephlien.github.io/landing/">Back</a>
            <p class="eyebrow">VIVERSE Avatar SDK</p>
            <h1>
              Launch Your
              <span data-text="Host Sample">Host Sample</span>
            </h1>
            <p class="hero-description">
              Register your host origin, generate a ready-to-run sample project, and start integrating the avatar flow with your own experience.
            </p>
          </section>

          <section class="register-panel" aria-label="Register form">
            <div class="register-panel-glow" aria-hidden="true"></div>
            <div class="panel-header">
              <h2>Get Your Sample Project</h2>
              <p>Provide your email and domain to generate the download package.</p>
            </div>

            <form id="generator-form" class="generator-form">
              <fieldset>
                <label>
                  <span>Email</span>
                  <input name="tenantId" type="text" placeholder="openme@htc.com">
                  <span class="field-error" data-field-error="tenantId"></span>
                </label>
                <label>
                  <span>Host Origin</span>
                  <input name="hostOrigin" type="url" placeholder="http://localhost:5500">
                  <span class="field-error" data-field-error="hostOrigin"></span>
                </label>
              </fieldset>

              <div class="form-actions">
                <button id="download-demo-button" class="hero-cta" type="button">Download</button>
              </div>
            </form>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
